name: transfer-schedule
on:
  schedule:
    - cron: '0 1 15,17,25,27 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'prep hoặc transfer (để trống = tự theo ngày)'
        required: false
        default: 'prep'
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run transfer schedule
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_APP_TOKEN: ${{ secrets.LARK_APP_TOKEN }}
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          ROT_WEBHOOK: ${{ secrets.ROT_WEBHOOK }}
          GOBOX_CLIENT_ID: ${{ secrets.GOBOX_CLIENT_ID }}
          GOBOX_CLIENT_SECRET: ${{ secrets.GOBOX_CLIENT_SECRET }}
          ROT_MODE: ${{ github.event.inputs.mode }}
        run: python transfer_schedule.py
      - name: Publish dashboard to Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transfer.html
          git commit -m "update transfer dashboard" || echo "no change"
          git push
