name: gobox-probe
# Chay 1 lan de DO endpoint don hang + enum PTTT cua Gobox. Xem ket qua o tab log.
# Credential Gobox/Lark da ghi san trong gobox.py/config.py -> chi can secret GOBOX_BASE.
on:
  workflow_dispatch:
    inputs:
      date:
        description: "Ngay do (YYYY-MM-DD), de trong = hom nay"
        required: false
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Probe Gobox
        env:
          GOBOX_BASE: ${{ secrets.GOBOX_BASE }}
          GOBOX_ORDER_PLATFORM: "6"
        run: |
          python probe_run.py ${{ github.event.inputs.date }} | tee probe_output.txt
      - name: Upload probe output
        uses: actions/upload-artifact@v4
        with:
          name: gobox-probe-output
          path: probe_output.txt
