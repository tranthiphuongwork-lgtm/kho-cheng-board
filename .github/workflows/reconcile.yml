name: reconcile-transfer-vs-bank
# Doi chieu doanh thu don POS chuyen khoan (Gobox) vs tien vao (Lark Sao ke).
# Credential Gobox/Lark da ghi san trong gobox.py/config.py -> chi can secret GOBOX_BASE.
on:
  schedule:
    - cron: "0 1 * * *"   # 08:00 gio VN moi ngay (UTC+7)
  workflow_dispatch:
    inputs:
      start:
        description: "Ngay bat dau (YYYY-MM-DD), de trong = hom nay"
        required: false
      end:
        description: "Ngay ket thuc (YYYY-MM-DD), de trong = start"
        required: false
      notify:
        description: "Gui thong bao Lark? (1/0)"
        required: false
        default: "1"
jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install openpyxl
      - name: Run reconcile (xuat Excel + gui Lark)
        env:
          GOBOX_BASE: ${{ secrets.GOBOX_BASE }}
          GOBOX_ORDER_PLATFORM: "6"
          RECON_NOTIFY: ${{ github.event.inputs.notify || '1' }}
        run: |
          python reconcile.py ${{ github.event.inputs.start }} ${{ github.event.inputs.end }}
      - name: Upload Excel
        uses: actions/upload-artifact@v4
        with:
          name: reconcile-xlsx
          path: reconcile_*.xlsx
          if-no-files-found: ignore
