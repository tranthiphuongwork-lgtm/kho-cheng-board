name: Daily kho update (18:30-22:30 VN, retry 30p)
on:
  schedule:
    - cron: '30 11 * * *'
    - cron: '0 12 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run update
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_APP_TOKEN: ${{ secrets.LARK_APP_TOKEN }}
          GOBOX_CLIENT_ID: ${{ secrets.GOBOX_CLIENT_ID }}
          GOBOX_CLIENT_SECRET: ${{ secrets.GOBOX_CLIENT_SECRET }}
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
        run: python cloud_update.py
      - name: Commit board
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add index.html daily_report.html
          git commit -m "auto board update" || echo "no change"
          git push
